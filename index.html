<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シフト作成システム - 最終完成版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>シフト作成システム</h1>
        
        <div class="controls">
            <input type="month" id="targetMonth" onchange="generateTable()">
            <div class="btn-group">
                <button onclick="addStaff()">＋スタッフ追加</button>
                <button onclick="autoFillShift()" class="primary-btn">自動生成開始</button>
            </div>
        </div>

        <div class="main-layout">
            <div id="staffList" class="staff-panel"></div>
            
            <div class="table-container">
                <table id="shiftTable">
                    <thead>
                        <tr id="dateRow"></tr>
                        <tr id="dayRow"></tr>
                    </thead>
                    <tbody id="shiftBody"></tbody>
                    <tfoot id="shiftFoot"></tfoot>
                </table>
            </div>
        </div>

        <div class="summary-panel">
            <h3>集計確認</h3>
            <div id="summaryList" class="summary-grid"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
