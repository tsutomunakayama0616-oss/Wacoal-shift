<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト自動生成 - 完全版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>シフト自動生成システム</h1>
        
        <div class="config-section">
            <div class="input-group">
                <label>対象年月:</label>
                <input type="month" id="targetMonth">
            </div>
            <div class="input-group">
                <label>標準必要人数:</label>
                <input type="number" id="defaultNeedCount" value="2" min="0">
            </div>
            <button onclick="autoFillShift()" class="btn-primary">自動生成を実行</button>
        </div>

        <div class="main-layout">
            <div class="staff-management">
                <h3>スタッフ管理</h3>
                <div id="staffList"></div>
                <button onclick="addStaff()" class="btn-secondary">+ スタッフ追加</button>
            </div>

            <div class="table-container">
                <table id="shiftTable">
                    <thead>
                        <tr id="dateRow"></tr>
                        <tr id="dayRow"></tr>
                        <tr id="holidayRow"></tr>
                    </thead>
                    <tbody id="shiftBody"></tbody>
                    <tfoot id="shiftFoot"></tfoot>
                </table>
            </div>

            <div class="summary-section">
                <h3>勤務集計</h3>
                <div id="summaryList"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
