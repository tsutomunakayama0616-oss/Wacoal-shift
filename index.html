<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト自動作成アプリ v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>シフト自動作成システム v2</h1>

        <section class="config-section">
            <div class="date-picker">
                <label>設定年月：</label>
                <input type="month" id="targetMonth" onchange="generateTable()">
            </div>
            
            <div class="staff-management">
                <h3>スタッフ管理</h3>
                <div id="staffList"></div>
                <button onclick="addStaff()">スタッフ追加</button>
            </div>
        </section>

        <section class="control-section">
            <div class="guide">
                <strong>【操作手順】</strong><br>
                1. <strong>定休日・希望休</strong>を先に選択してください（定休日は全員「公」にするなど）。<br>
                2. 日ごとの<strong>「必要人数」</strong>（表の最下部）を入力してください。<br>
                3. 「シフト自動入力実行」をクリックしてください。
            </div>
            <button class="btn-generate" onclick="autoFillShift()">シフト自動入力実行</button>
        </section>

        <div class="table-wrapper">
            <table id="shiftTable">
                <thead>
                    <tr id="dateRow"></tr>
                    <tr id="dayRow"></tr>
                </thead>
                <tbody id="shiftBody"></tbody>
                <tfoot id="shiftFoot">
                    </tfoot>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
