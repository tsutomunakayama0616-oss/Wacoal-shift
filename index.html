<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト自動生成</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>
<h1>シフト自動生成</h1>

<div>
対象月：
<input type="month" id="targetMonth">
必要人数：
<input type="number" id="defaultNeedCount" value="3">
<button onclick="generateTable()">再描画</button>
</div>

<hr>

<h2>スタッフ</h2>
<div id="staffList"></div>
<button onclick="addStaff()">追加</button>

<hr>

<button onclick="autoFillShift()">自動生成</button>
<button onclick="resetShift()">リセット</button>
<button onclick="saveData()">保存</button>
<button onclick="loadData()">読込</button>

<table border="1">
<thead>
<tr id="dateRow"></tr>
<tr id="dayRow"></tr>
<tr id="holidayRow"></tr>
</thead>
<tbody id="shiftBody"></tbody>
<tfoot id="shiftFoot"></tfoot>
</table>

<h2>集計</h2>
<div id="summaryList"></div>

<script src="script.js"></script>
</body>
</html>
