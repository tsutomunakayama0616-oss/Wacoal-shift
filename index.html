<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シフト作成システム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>シフト作成システム</h1>

        <div class="controls">
            <input type="month" id="targetMonth" onchange="generateTable()">
            <div class="btn-group">
                <button class="add-btn" onclick="addStaff()">＋スタッフ追加</button>
                <button class="primary-btn" onclick="autoFillShift()">自動生成開始</button>
            </div>
        </div>

        <div id="staffList" class="staff-panel"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr id="dateRow"></tr>
                    <tr id="dayRow"></tr>
                    <tr id="holidayRow"></tr>
                </thead>
                <tbody id="shiftBody"></tbody>
                <tfoot id="shiftFoot"></tfoot>
            </table>
        </div>

        <div id="summaryList" class="summary-grid"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
