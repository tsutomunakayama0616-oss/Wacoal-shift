<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Shift Manager v4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Shift Planner <span class="version">Pro v4</span></h1>
            <div class="header-controls">
                <input type="month" id="targetMonth" onchange="generateTable()">
                <button class="btn-primary" onclick="autoFillShift()">自動作成を実行</button>
            </div>
        </header>

        <main>
            <aside class="sidebar">
                <div class="card">
                    <h3>スタッフ設定</h3>
                    <div id="staffList"></div>
                    <button class="btn-secondary" onclick="addStaff()">+ 追加</button>
                </div>

                <div class="card status-card">
                    <h3>今月の集計</h3>
                    <div id="summaryList">
                        <p class="placeholder">作成後に表示されます</p>
                    </div>
                </div>
            </aside>

            <section class="table-area">
                <div class="guide-banner">
                    ❶ 希望休・定休日を選択 ❷ 最下部の必要人数を入力 ❸ 実行
                </div>
                <div class="table-wrapper">
                    <table id="shiftTable">
                        <thead>
                            <tr id="dateRow"></tr>
                            <tr id="dayRow"></tr>
                        </thead>
                        <tbody id="shiftBody"></tbody>
                        <tfoot id="shiftFoot"></tfoot>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
